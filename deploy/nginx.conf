# Nginx site config for Phonograph.
# Serves the built frontend (static) and reverse-proxies /api to the backend.
# Place behind Cloudflare; terminate TLS at Cloudflare or with certbot here.

server {
    listen 80;
    server_name phonograph.example.com;

    # Built frontend (output of `npm run build` in frontend/).
    root /var/www/phonograph;
    index index.html;

    # Cap upload body size. Metadata payloads are small; this is a safety net
    # consistent with the no-audio-upload invariant.
    client_max_body_size 32m;

    # API -> FastAPI/uvicorn (managed by systemd, listening on 127.0.0.1:8000).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
